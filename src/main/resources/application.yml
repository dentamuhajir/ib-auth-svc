server:
  port: 8080

spring:
  application:
    name: ib-auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ib_auth}
    username: ${SPRING_DATASOURCE_USERNAME:ib_user}
    password: ${SPRING_DATASOURCE_PASSWORD:zcbsdbsdgwegwet23}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jwt:
    secret-key: ${JWT_SECRET:MzY0YmY4N2Y1M2NlYmI2ODVjM2E1YmU3MGY5YzM0YmI5MTY2YThmYmY0ZTI3M2M1YmVkYmE4ZGNlMmU3YmI2Zg==}
    ttl-ms: ${JWT_TTL:3600000} # 1 hour
    refresh-ttl-ms: ${JWT_REFRESH_TTL:604800000} # 7 days