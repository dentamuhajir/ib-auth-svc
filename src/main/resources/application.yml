server:
  port: 8080

spring:
  application:
    name: ib-auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ib_auth}
    username: ${SPRING_DATASOURCE_USERNAME:ib_user}
    password: ${SPRING_DATASOURCE_PASSWORD:zcbsdbsdgwegwet23}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration